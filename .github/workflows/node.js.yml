# This workflow will do a clean installation of node dependencies, cache/restore them, build the source code and run tests across different versions of node
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs

name: Node.js CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [16.x]
    steps:
    - uses: actions/checkout@v3
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v3
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
      env:
        GH_TOKEN: ${{ secrets.GH_TOKEN }}
    - run: npm install
    - run: npm run build
    - run: rm -rf .git
    - run: git clone https://imanton2:$GH_TOKEN@github.com/imanton2/about.git --branch=gh-pages gh-pages --no-checkout
    - run: mv build/* gh-pages/
    - run: pwd
    - run: cd gh-pages/ && git add --all && git commit -am 'update' && git push https://imanton2:$GH_TOKEN@github.com/imanton2/about.git